<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="eggyolk" />
    <meta property="og:description" content="make tools more easy to use" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kitzure.github.io/eggyolk/" />
    <meta name="theme-color" content="#fbbf24" />
    <title>eggyolk</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="splash-screen" id="splash">
      <div class="splash-content">
        <span class="splash-icon" id="splash-icon">🍳</span>
        <h1 class="splash-title">eggyolk</h1>
        <p class="splash-subtitle">make tools more easy to use</p>
      </div>
    </div>
    <div class="container" id="main-container">
      <header class="site-header">
        <span class="header-icon">🍳</span>
        <h1 class="title-fun">eggyolk</h1>
        <p class="home-subtitle">make tools more easy to use</p>
      </header>

      <div class="divider"></div>

      <main class="tools-grid">
        <a class="tool-card" href="vtc-attendance.html">
          <div class="tool-icon-wrap">
            <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="8" />
              <path d="M12 8v5l3 2" />
            </svg>
          </div>
          <span class="tool-name">VTC attendance checker</span>
          <span class="tool-desc">check your attendance in vtc myportal</span>
        </a>

        <a class="tool-card" href="wisewage.html">
          <div class="tool-icon-wrap money">
            <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <span class="tool-name">wisewage</span>
          <span class="tool-desc">make your money manage skills better</span>
        </a>
      </main>

      <a class="about-top-right" href="about.html">
        <span class="about-q">?</span>
        <span class="about-tooltip">about me</span>
      </a>
    </div>
    <script>
      (function() {
        var splash = document.getElementById('splash');
        var mainContainer = document.getElementById('main-container');
        var seen = sessionStorage.getItem('eggyolk-splash');
        if (seen) {
          if (splash) splash.classList.add('splash-hidden');
          if (mainContainer) mainContainer.classList.remove('main-hidden');
        } else {
          if (mainContainer) mainContainer.classList.add('main-hidden');
          if (splash) {
            setTimeout(function() {
              splash.classList.add('splash-flying');
            }, 900);
            setTimeout(function() {
              if (mainContainer) {
                mainContainer.classList.remove('main-hidden');
                mainContainer.classList.add('main-container-enter');
              }
              splash.classList.add('splash-fade');
            }, 1400);
            setTimeout(function() {
              splash.classList.add('splash-hidden');
            }, 1900);
          }
          sessionStorage.setItem('eggyolk-splash', '1');
        }
      })();
    </script>
  </body>
</html>
